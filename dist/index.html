<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音對話 - OpenAI Realtime A2A</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
    }
    .chat-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 16px;
      background: #0f1629;
      border-radius: 12px;
      margin-bottom: 20px;
      min-height: 200px;
    }
    .message {
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 12px;
    }
    .message.system { background: #1e3a5f; color: #88c4f8; font-size: 14px; }
    .message.user { background: #2563eb; color: white; margin-left: 20px; }
    .message.ai { background: #059669; color: white; margin-right: 20px; }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .call-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-size: 32px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: all 0.2s;
    }
    .call-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    .call-btn.recording { background: #dc2626; animation: pulse 1s infinite; }
    .status { text-align: center; color: #666; margin-top: 16px; font-size: 14px; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DF7xIyqo.js"></script>
</head>
<body>
  <h1>🎙️ OpenAI Realtime A2A</h1>
  <p class="subtitle">原生語音輸入輸出，低延遲 2-3 秒</p>
  
  <div class="card">
    <div class="chat-container" id="chatContainer">
      <div class="message system">🎙️ 點擊麥克風開始對話</div>
    </div>
    
    <div class="controls">
      <button class="call-btn" id="callBtn">🎤</button>
    </div>
    
    <div class="status" id="status"></div>
  </div>
  
</body>
</html>
